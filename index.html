<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F3F1EA">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>D POS</title>
<link id="manifest-link" rel="manifest">
<style>
/* ============================================================
   DESIGN TOKENS
   Palette: register-tape paper + ink, with cash-drawer green
   and warning amber as the two functional accents.
   Display type: Sora (headings/UI) · Body: Inter · Numerals/
   receipt: "Space Mono" fallback stack for a ticket-printer feel.
   ============================================================ */
:root{
  --bg:#F3F1EA; --surface:#FFFFFF; --surface-2:#FBFAF6; --surface-3:#EFEDE4;
  --border:#E1DED2; --text:#1A1D23; --muted:#6B7080; --muted-2:#9AA0AE;
  --accent:#00A87E; --accent-ink:#EAFBF5; --accent-2:#B8790E; --danger:#D63A57;
  --radius-lg:22px; --radius-md:16px; --radius-sm:10px;
  --shadow-1:0 8px 24px rgba(20,20,15,.08); --shadow-2:0 2px 10px rgba(20,20,15,.06);
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  --font-ui:'Sora',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-body:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'Space Mono','SFMono-Regular',Consolas,'Liberation Mono',monospace;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text); font-family:var(--font-body);
  overflow:hidden; overscroll-behavior:none; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit; -webkit-user-select:none; user-select:none;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:0; height:0;}
.mono{font-family:var(--font-mono);}
.hidden{display:none !important;}
.screen-reader-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0);}

/* ---------- App shell ---------- */
#app{position:fixed; inset:0; display:flex; flex-direction:column; height:100%;}

header.topbar{
  padding:calc(12px + var(--safe-top)) 16px 10px; background:var(--surface);
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.topbar-row{display:flex; align-items:center; gap:10px;}
.brand{display:flex; align-items:center; gap:9px; flex-shrink:0;}
.brand-mark{
  width:34px; height:34px; border-radius:10px; background:var(--accent); color:var(--accent-ink);
  display:flex; align-items:center; justify-content:center; font-family:var(--font-ui); font-weight:800; font-size:16px;
}
.brand-name{font-family:var(--font-ui); font-weight:700; font-size:15px; letter-spacing:.2px; display:none;}
.search-wrap{
  flex:1; display:flex; align-items:center; gap:8px; background:var(--surface-2); border:1px solid var(--border);
  border-radius:14px; padding:0 12px; height:42px;
}
.search-wrap svg{flex-shrink:0; opacity:.6;}
.search-wrap input{
  flex:1; border:0; background:transparent; outline:none; color:var(--text); font-size:14.5px; height:100%;
}
.search-wrap input::placeholder{color:var(--muted-2);}
.icon-btn{
  width:42px; height:42px; border-radius:13px; border:1px solid var(--border); background:var(--surface-2);
  color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative;
  flex-shrink:0; transition:transform .15s ease, background .2s ease; overflow:hidden;
}
.icon-btn:active{transform:scale(.9);}
.icon-btn.accent{background:var(--accent); border-color:var(--accent); color:var(--accent-ink);}
.badge-dot{
  position:absolute; top:6px; right:6px; width:8px; height:8px; border-radius:50%; background:var(--danger);
  border:2px solid var(--surface);
}
.chips-row{display:flex; gap:8px; overflow-x:auto; padding:12px 16px 2px; flex-shrink:0;}
.chip{
  flex-shrink:0; padding:8px 15px; border-radius:100px; border:1px solid var(--border); background:var(--surface);
  color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; position:relative; overflow:hidden;
  transition:all .18s ease;
}
.chip.active{background:var(--accent); border-color:var(--accent); color:var(--accent-ink);}
.sort-row{display:flex; align-items:center; justify-content:space-between; padding:10px 16px 4px; flex-shrink:0;}
.sort-row .count{font-size:12.5px; color:var(--muted);}
.sort-select{
  border:1px solid var(--border); background:var(--surface); color:var(--text); border-radius:10px; font-size:12.5px;
  padding:7px 10px; outline:none;
}

main.content{flex:1; overflow-y:auto; padding:8px 16px 180px; -webkit-overflow-scrolling:touch;}
.product-list{display:flex; flex-direction:column; gap:10px;}
.product-card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md);
  cursor:pointer; position:relative; box-shadow:var(--shadow-2); transition:transform .15s ease;
  display:flex; align-items:center; gap:12px; padding:9px 10px;
}
.product-card:active{transform:scale(.97);}
.product-card .thumb{
  width:52px; height:52px; flex-shrink:0; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px;
  background:var(--surface-3);
}
.product-card .thumb img{width:100%; height:100%; object-fit:cover; border-radius:14px;}
.p-info{flex:1; min-width:0;}
.p-name{font-size:13.5px; font-weight:600; line-height:1.25; margin:0 0 3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.p-cat{font-size:10.5px; color:var(--muted); margin:0;}
.p-bottom{display:flex; align-items:center; justify-content:flex-end; flex-shrink:0;}
.p-price{font-family:var(--font-mono); font-size:14.5px; font-weight:700; color:var(--accent);}
.empty-state{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; text-align:center; color:var(--muted); gap:8px;}
.empty-state .emoji{font-size:44px;}
.skeleton{background:linear-gradient(90deg,var(--surface-3) 25%,var(--surface-2) 37%,var(--surface-3) 63%); background-size:400% 100%; animation:shimmer 1.4s ease infinite;}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}

/* ---------- Cart summary bar ---------- */
.cart-bar{
  position:absolute; left:12px; right:12px; bottom:calc(78px + var(--safe-bottom)); z-index:40;
  background:var(--surface); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow-1);
  display:flex; align-items:center; gap:12px; padding:10px 12px;
  transform:translateY(140%); opacity:0; visibility:hidden; pointer-events:none;
  transition:transform .32s cubic-bezier(.2,.9,.3,1.2), opacity .2s ease, visibility 0s linear .32s;
}
.cart-bar.show{transform:translateY(0); opacity:1; visibility:visible; pointer-events:auto; transition:transform .32s cubic-bezier(.2,.9,.3,1.2), opacity .2s ease, visibility 0s linear 0s;}
.cart-bar .cart-icon-wrap{
  width:40px; height:40px; border-radius:12px; background:var(--accent); color:var(--accent-ink);
  display:flex; align-items:center; justify-content:center; position:relative; flex-shrink:0;
}
.cart-count{
  position:absolute; top:-6px; right:-6px; background:var(--danger); color:#fff; font-size:10px; font-weight:800;
  min-width:18px; height:18px; border-radius:100px; display:flex; align-items:center; justify-content:center; padding:0 4px;
}
.cart-bar .cart-mid{flex:1; overflow:hidden;}
.cart-mid .label{font-size:11px; color:var(--muted);}
.cart-mid .amount{font-family:var(--font-mono); font-weight:700; font-size:16px;}
.cart-bar .checkout-pill{
  background:var(--accent); color:var(--accent-ink); border:none; border-radius:100px; padding:11px 18px;
  font-weight:700; font-size:13px; display:flex; align-items:center; gap:6px; cursor:pointer;
}

/* ---------- Bottom nav ---------- */
nav.bottomnav{
  position:relative; flex-shrink:0; display:flex; align-items:center; justify-content:space-around;
  background:var(--surface); border-top:1px solid var(--border); padding:8px 6px calc(8px + var(--safe-bottom));
  z-index:30;
}
.nav-btn{
  background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted);
  font-size:10.5px; font-weight:600; padding:6px 14px; cursor:pointer; border-radius:12px;
}
.nav-btn.active{color:var(--accent);}
.nav-scan{
  width:56px; height:56px; border-radius:18px; background:var(--accent); color:var(--accent-ink); margin-top:-30px;
  box-shadow:0 8px 20px rgba(0,217,163,.4); display:flex; align-items:center; justify-content:center; border:4px solid var(--surface);
}

/* ---------- Overlay / Sheets / Modals ---------- */
.overlay{
  position:absolute; inset:0; background:rgba(0,0,0,.55); z-index:50; opacity:0; pointer-events:none; transition:opacity .25s ease;
}
.overlay.show{opacity:1; pointer-events:auto;}
.sheet{
  position:absolute; left:0; right:0; bottom:0; background:var(--surface); border-radius:24px 24px 0 0; z-index:60;
  max-height:88vh; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .32s cubic-bezier(.2,.9,.25,1);
  box-shadow:0 -10px 30px rgba(0,0,0,.3); padding-bottom:var(--safe-bottom);
}
.sheet.show{transform:translateY(0);}
.sheet-grip{width:38px; height:4px; background:var(--border); border-radius:100px; margin:10px auto 4px;}
.sheet-head{display:flex; align-items:center; justify-content:space-between; padding:6px 18px 12px; border-bottom:1px solid var(--border);}
.sheet-head h2{font-family:var(--font-ui); font-size:17px; margin:0;}
.sheet-close{width:32px; height:32px; border-radius:10px; border:none; background:var(--surface-2); color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer;}
.sheet-body{overflow-y:auto; padding:14px 18px; flex:1; -webkit-overflow-scrolling:touch;}
.sheet-foot{padding:14px 18px; border-top:1px solid var(--border);}

.modal-center-wrap{position:absolute; inset:0; z-index:70; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .25s ease;}
.modal-center-wrap.show{opacity:1; pointer-events:auto;}
.modal-card{background:var(--surface); border-radius:20px; width:100%; max-width:400px; max-height:85vh; display:flex; flex-direction:column; box-shadow:var(--shadow-1); transform:scale(.9); transition:transform .25s cubic-bezier(.2,.9,.25,1);}
.modal-center-wrap.show .modal-card{transform:scale(1);}

/* ---------- Cart items ---------- */
.cart-item{display:flex; gap:11px; padding:12px 0; border-bottom:1px solid var(--border);}
.cart-item .thumb-sm{width:52px; height:52px; border-radius:12px; background:var(--surface-3); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0;}
.cart-item .ci-mid{flex:1; min-width:0;}
.cart-item .ci-name{font-size:13.5px; font-weight:600; margin:0 0 2px;}
.cart-item .ci-price{font-family:var(--font-mono); font-size:12.5px; color:var(--muted);}
.qty-ctrl{display:flex; align-items:center; gap:8px; margin-top:6px;}
.qty-btn{width:26px; height:26px; border-radius:8px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer;}
.qty-val{font-family:var(--font-mono); font-weight:700; min-width:18px; text-align:center; font-size:13px;}
.ci-right{display:flex; flex-direction:column; align-items:flex-end; justify-content:space-between;}
.ci-total{font-family:var(--font-mono); font-weight:700; font-size:13.5px;}
.ci-remove{background:none; border:none; color:var(--danger); font-size:11px; cursor:pointer; padding:4px;}
.ci-extra-row{display:flex; gap:6px; margin-top:6px;}
.ci-extra-row input{width:60px; font-size:11px; padding:5px 6px; border-radius:8px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); outline:none;}
.ci-extra-row label{font-size:10px; color:var(--muted); display:flex; align-items:center; gap:4px;}

.summary-row{display:flex; justify-content:space-between; font-size:13.5px; padding:5px 0; color:var(--muted);}
.summary-row.total{color:var(--text); font-weight:800; font-size:17px; padding-top:10px; margin-top:6px; border-top:1px dashed var(--border);}
.summary-row .val{font-family:var(--font-mono);}

.btn-primary{
  width:100%; padding:15px; border-radius:16px; border:none; background:var(--accent); color:var(--accent-ink);
  font-weight:800; font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  position:relative; overflow:hidden;
}
.btn-primary:disabled{opacity:.4;}
.btn-secondary{
  width:100%; padding:14px; border-radius:16px; border:1px solid var(--border); background:var(--surface-2); color:var(--text);
  font-weight:700; font-size:14px; cursor:pointer; margin-top:8px;
}
.btn-danger-ghost{color:var(--danger); background:transparent; border:1px solid var(--danger);}

/* ---------- Form fields ---------- */
.field{margin-bottom:14px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px;}
.field input,.field select,.field textarea{
  width:100%; padding:12px 13px; border-radius:12px; border:1px solid var(--border); background:var(--surface-2);
  color:var(--text); font-size:14px; outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.pay-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;}
.pay-opt{
  border:1px solid var(--border); background:var(--surface-2); border-radius:12px; padding:10px 6px; text-align:center;
  cursor:pointer; font-size:11.5px; font-weight:600; color:var(--muted); display:flex; flex-direction:column; gap:5px; align-items:center;
}
.pay-opt .em{font-size:18px;}
.pay-opt.active{border-color:var(--accent); background:var(--accent-ink); color:var(--accent);}
.toggle-row{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.toggle-row .t-label{font-size:14px; font-weight:600;}
.toggle-row .t-sub{font-size:11.5px; color:var(--muted); margin-top:2px;}
.switch{width:44px; height:26px; border-radius:100px; background:var(--surface-3); border:1px solid var(--border); position:relative; cursor:pointer; flex-shrink:0;}
.switch::after{content:''; position:absolute; width:20px; height:20px; border-radius:50%; background:#fff; top:2px; left:2px; transition:transform .2s ease; box-shadow:0 1px 3px rgba(0,0,0,.3);}
.switch.on{background:var(--accent);}
.switch.on::after{transform:translateX(18px);}
.seg-control{display:flex; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:3px; gap:3px;}
.seg-btn{flex:1; text-align:center; padding:8px 4px; border-radius:9px; font-size:12px; font-weight:700; color:var(--muted); cursor:pointer;}
.seg-btn.active{background:var(--accent); color:var(--accent-ink);}

/* ---------- Toasts ---------- */
#toast-stack{position:absolute; top:calc(12px + var(--safe-top)); left:16px; right:16px; z-index:200; display:flex; flex-direction:column; gap:8px; pointer-events:none;}
.toast{
  background:var(--surface-3); border:1px solid var(--border); border-radius:14px; padding:12px 14px; display:flex; gap:10px;
  align-items:center; box-shadow:var(--shadow-1); transform:translateY(-30px); opacity:0; transition:all .3s cubic-bezier(.2,.9,.25,1);
}
.toast.show{transform:translateY(0); opacity:1;}
.toast .t-ic{font-size:18px;}
.toast .t-txt{font-size:13px; font-weight:600; flex:1;}
.toast.success{border-color:var(--accent);}
.toast.error{border-color:var(--danger);}

/* ---------- Scanner (half-screen camera + half-screen scanned items) ---------- */
#scanner-modal{position:absolute; inset:0; background:var(--bg); z-index:90; display:flex; flex-direction:column;}
.scanner-cam{position:relative; height:48%; flex-shrink:0; background:#000; overflow:hidden;}
#scanner-video{width:100%; height:100%; object-fit:cover; background:#000;}
.scan-frame{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:70%; max-width:240px; aspect-ratio:1.6/1;
  border:3px solid var(--accent); border-radius:18px; box-shadow:0 0 0 2000px rgba(0,0,0,.45);
}
.scan-frame::before{content:''; position:absolute; left:0; right:0; height:2px; background:var(--accent); top:0; animation:scanline 1.8s ease-in-out infinite; box-shadow:0 0 8px var(--accent);}
@keyframes scanline{0%{top:4%}50%{top:92%}100%{top:4%}}
.scanner-top{position:absolute; top:calc(14px + var(--safe-top)); left:14px; right:14px; display:flex; justify-content:space-between; z-index:2;}
.scanner-bottom{position:absolute; bottom:10px; left:14px; right:14px; z-index:2;}
.flash-ok{position:absolute; inset:0; background:var(--accent); opacity:0; pointer-events:none; z-index:3;}
.flash-ok.flash{animation:flashpop .35s ease;}
@keyframes flashpop{0%{opacity:.6}100%{opacity:0}}
.scanner-msg{color:#fff; text-align:center; font-size:12.5px; background:rgba(0,0,0,.45); padding:8px 12px; border-radius:100px; margin-bottom:10px;}
.scanner-items{flex:1; overflow-y:auto; padding:14px 16px calc(14px + var(--safe-bottom)); background:var(--bg);}
.scanner-items h3{font-family:var(--font-ui); font-size:13px; margin:0 0 10px; color:var(--muted);}
.scanned-card{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:10px 12px; margin-bottom:8px; box-shadow:var(--shadow-2);}
.scanned-card .thumb-sm{width:40px; height:40px; border-radius:11px; background:var(--surface-3); display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0;}
.scanned-card .sc-mid{flex:1; min-width:0;}
.scanned-card .sc-name{font-size:13px; font-weight:600; margin:0 0 2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.scanned-card .sc-sub{font-size:11px; color:var(--muted);}
.scanned-card .sc-qty{font-family:var(--font-mono); font-weight:700; font-size:13px; color:var(--accent); flex-shrink:0;}

/* ---------- Receipt ---------- */
.receipt-paper{
  background:#fdfdf8; color:#111; font-family:var(--font-mono); font-size:11.5px; padding:18px 14px; border-radius:6px;
  margin:0 auto; position:relative;
}
.receipt-paper.w58{width:58mm;}
.receipt-paper.w80{width:80mm;}
.receipt-paper hr{border:none; border-top:1px dashed #999; margin:8px 0;}
.receipt-paper .center{text-align:center;}
.receipt-paper .row{display:flex; justify-content:space-between; gap:6px;}
.receipt-paper .store-name{font-size:15px; font-weight:700;}
.receipt-paper .thank-you{font-weight:700;}
.receipt-paper .line-item{margin-bottom:5px;}
.receipt-paper .li-name{font-weight:600; margin-bottom:2px; word-break:break-word;}
.receipt-paper .li-cols{display:flex; font-size:10.5px; color:#555;}
.receipt-paper .li-cols span{flex:1;}
.receipt-paper .li-cols .li-qty{text-align:left;}
.receipt-paper .li-cols .li-price{text-align:center;}
.receipt-paper .li-cols .li-total{text-align:right; font-weight:600; color:#222;}
.receipt-paper canvas{display:block; margin:8px auto 0;}
#receipt-scroll{overflow-y:auto; max-height:60vh; padding:14px 0;}
.receipt-actions{display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 18px;}
.receipt-actions button{padding:12px; border-radius:12px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); font-weight:700; font-size:12.5px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;}

@media print{
  body *{visibility:hidden;}
  #receipt-print-area, #receipt-print-area *{visibility:visible;}
  #receipt-print-area{position:absolute; top:0; left:0; width:100%;}
}

/* ---------- Ripple ---------- */
.ripple{position:absolute; border-radius:50%; background:rgba(0,0,0,.12); transform:scale(0); animation:rip .5s ease-out; pointer-events:none;}
